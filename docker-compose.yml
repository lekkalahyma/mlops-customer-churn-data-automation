version: "3"

services:

  api:
    build: .
    container_name: churn-api

    ports:
      - "8000:8000"

    depends_on:
      - mlflow

  mlflow:
    image: ghcr.io/mlflow/mlflow

    container_name: mlflow-server

    ports:
      - "5000:5000"

    command: >
      mlflow server
      --host 0.0.0.0
      --port 5000